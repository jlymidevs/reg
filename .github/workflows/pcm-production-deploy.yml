name: PCM Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY_PCM to apply migrations and deploy PCM production'
        required: true
        type: string

concurrency:
  group: pcm-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF: gadjquxavyxsftnwurfo
  VERCEL_ORG_ID: team_47aFKfWyp0hx2YKRfyteBxWO
  VERCEL_PROJECT_ID: prj_PgDM1TAXwm8zJB41TtZxmSenGmsT

jobs:
  deploy:
    if: inputs.confirm == 'DEPLOY_PCM'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Check out merged release
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          SUPABASE_ACCESS_TOKEN="$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '\r\n')"
          SUPABASE_ACCESS_TOKEN="${SUPABASE_ACCESS_TOKEN#\"}"
          SUPABASE_ACCESS_TOKEN="${SUPABASE_ACCESS_TOKEN%\"}"
          export SUPABASE_ACCESS_TOKEN
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Excel import function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy parse-excel-import --project-ref "$SUPABASE_PROJECT_REF"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy PCM to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN"
          corepack enable
          pnpm install --frozen-lockfile
          pnpm dlx vercel@55.0.0 link --yes --scope "$VERCEL_ORG_ID" --project "$VERCEL_PROJECT_ID" --token "$VERCEL_TOKEN"
          pnpm dlx vercel@55.0.0 pull --yes --environment=production --token "$VERCEL_TOKEN"
          set -a
          source .vercel/.env.production.local
          set +a
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          pnpm dlx vercel@55.0.0 build --prod --token "$VERCEL_TOKEN"
          pnpm dlx vercel@55.0.0 deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Verify production response
        run: |
          status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' https://pcm.jlycc.org/forbidden)
          test "$status" = "200"
